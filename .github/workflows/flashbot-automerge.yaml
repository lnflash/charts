name: flashbot-automerge
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  # check_run NEVER fires for checks produced by GitHub Actions itself:
  # events created with GITHUB_TOKEN don't trigger workflows (anti-recursion).
  # Since dev-smoketest moved onto Actions runners, the "final check went
  # green" moment was invisible here and bump PRs sat unmerged (seen on
  # charts#212, 2026-07-10). workflow_run IS delivered for completed Actions
  # workflows, so use it as the post-checks trigger. check_run kept for any
  # external (Checks-API) CI.
  check_run:
    types: [completed]
    branches: ['bot-*']
  workflow_run:
    workflows: ["dev-smoketest"]
    types: [completed]

jobs:
  automerge:
    if: |
      github.event_name == 'check_run' ||
      github.event_name == 'workflow_run' ||
      contains(github.event.pull_request.labels.*.name, 'flashbot')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      checks: read
      # Dispatch publish-flash-chart after merging a chart-version bump (see the
      # merge step). workflow_dispatch is exempt from the GITHUB_TOKEN
      # anti-recursion rule, so this token can trigger it without a PAT.
      actions: write
    steps:
      - name: Merge eligible flashbot PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 50
            });

            const botPrs = prs.filter(pr =>
              pr.labels.some(l => l.name === 'flashbot') &&
              !(pr.head.repo && pr.head.repo.fork)
            );

            if (botPrs.length === 0) {
              core.info('No open flashbot PRs');
              return;
            }

            for (const pr of botPrs) {
              core.info(`Checking PR #${pr.number}: ${pr.title}`);

              // `mergeable` is only computed by pulls.get, not pulls.list.
              const { data: full } = await github.rest.pulls.get({
                owner, repo, pull_number: pr.number
              });
              if (full.mergeable === false) {
                core.info(`  Has merge conflicts, skipping`);
                continue;
              }
              if (full.mergeable === null) {
                core.info(`  Mergeability still computing, skipping this run`);
                continue;
              }

              // Get check runs for the PR head sha
              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo, ref: full.head.sha, per_page: 100
              });

              // Ignore our own job's check runs: an in-progress automerge run
              // attaches to the same head sha and would otherwise see itself
              // as "still running" and skip forever.
              const runs = checks.check_runs.filter((r) => r.name !== 'automerge');
              if (runs.length === 0) {
                core.info(`  No checks yet, skipping`);
                continue;
              }

              const allCompleted = runs.every(r => r.status === 'completed');
              if (!allCompleted) {
                const pending = runs.filter(r => r.status !== 'completed').length;
                core.info(`  ${pending} check(s) still running`);
                continue;
              }

              const allSuccess = runs.every(r =>
                r.conclusion === 'success' ||
                r.conclusion === 'neutral' ||
                r.conclusion === 'skipped'
              );
              if (!allSuccess) {
                const failed = runs
                  .filter(r => r.conclusion !== 'success' &&
                               r.conclusion !== 'neutral' &&
                               r.conclusion !== 'skipped')
                  .map(r => `${r.name} (${r.conclusion})`);
                core.info(`  Checks failed: ${failed.join(', ')}`);
                continue;
              }

              core.info(`  All checks passed, merging (squash)...`);
              let merged = false;
              try {
                await github.rest.pulls.merge({
                  owner, repo,
                  pull_number: pr.number,
                  merge_method: 'squash'
                });
                merged = true;
                core.info(`  Merged PR #${pr.number}`);
              } catch (e) {
                core.warning(`  Merge failed for #${pr.number}: ${e.message}`);
              }

              // A merge performed with GITHUB_TOKEN does NOT trigger
              // push-based workflows (anti-recursion), so publish-flash-chart
              // never fires on a bot-merged chart bump and the new version
              // silently never publishes. workflow_dispatch is exempt from
              // that rule, so when the merged PR changed the flash chart,
              // dispatch publish-flash-chart explicitly. Path check mirrors
              // that workflow's own push trigger (charts/flash/Chart.yaml).
              if (merged) {
                try {
                  const { data: files } = await github.rest.pulls.listFiles({
                    owner, repo, pull_number: pr.number, per_page: 100
                  });
                  if (files.some(f => f.filename === 'charts/flash/Chart.yaml')) {
                    core.info(`  #${pr.number} bumped the flash chart — dispatching publish-flash-chart`);
                    await github.rest.actions.createWorkflowDispatch({
                      owner, repo,
                      workflow_id: 'publish-flash-chart.yaml',
                      ref: 'main'
                    });
                  }
                } catch (e) {
                  core.warning(`  Could not dispatch publish-flash-chart for #${pr.number}: ${e.message}`);
                }
              }
            }
