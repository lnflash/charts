name: Check formatting
on:
  pull_request:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Terraform fmt
      uses: hashicorp/setup-terraform@v3
    - run: terraform fmt -recursive .
    - run: git diff --exit-code
