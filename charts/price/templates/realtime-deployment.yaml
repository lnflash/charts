apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "price.realtime.fullname" . }}
  labels:
    {{- include "price.realtime.labels" . | nindent 4 }}
    kube-monkey/enabled: enabled
    kube-monkey/identifier: priceRealtime
    kube-monkey/kill-mode: fixed
    kube-monkey/kill-value: "1"
    kube-monkey/mtbf: "8"
spec:
  selector:
    matchLabels:
      {{- include "price.realtime.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/realtime-config-secret.yaml") . | sha256sum }}
      {{- with .Values.realtime.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "price.realtime.selectorLabels" . | nindent 8 }}
        kube-monkey/enabled: enabled
        kube-monkey/identifier: price
    spec:
      containers:
        - name: realtime
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ $.Values.realtime.image.repository }}@{{ $.Values.realtime.image.digest }}"
          ports:
            - name: grpc
              containerPort: {{ .Values.realtime.service.grpc }}
              protocol: TCP
            - name: prometheus
              containerPort: {{ .Values.realtime.service.prometheus }}
              protocol: TCP
          env:
          - name: IBEX_URL
            value: {{ .Values.ibex.url | quote }}
          - name: IBEX_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.ibex.secrets.name | quote }}
                key: {{ .Values.ibex.secrets.clientId.key | quote }}
          - name: IBEX_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Values.ibex.secrets.name | quote }}
                key: {{ .Values.ibex.secrets.clientSecret.key | quote }}
          - name: IBEX_ENVIRONMENT
            value: {{ .Values.ibex.environment | quote }}
          - name: REDIS_MASTER_NAME
            value: {{ .Values.redis.sentinel.masterSet | quote }}
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.redis.auth.existingSecret | quote }}
                key: {{ .Values.redis.auth.existingSecretPasswordKey | quote }}
          {{- if not .Values.redis.sentinel.enabled }}
          - name: REDIS_TYPE
            value: "standalone"
          {{- end }}
          {{ range until (.Values.redis.replica.replicaCount | int) }}
          - name: {{ printf "REDIS_%d_DNS" . }}
            value: {{ printf "%s-redis-node-%d.%s-redis-headless" $.Release.Name . $.Release.Name | quote }}
          {{ end }}
          volumeMounts:
            - name: custom-yaml
              mountPath: "/var/yaml/"
          # The grpc health endpoint reports NOT_SERVING whenever the realtime
          # USD price is stale (upstream feed gap), not only when the process
          # is wedged. Liveness must therefore be far more tolerant than
          # readiness: restarting cannot conjure an upstream price, and with a
          # single replica each kill is a full price outage.
          livenessProbe:
            grpc:
              port: 50051
              service: ""
            initialDelaySeconds: {{ .Values.realtime.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.realtime.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.realtime.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.realtime.livenessProbe.failureThreshold }}
          readinessProbe:
            grpc:
              port: 50051
              service: ""
            periodSeconds: {{ .Values.realtime.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.realtime.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.realtime.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.realtime.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.realtime.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.realtime.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: custom-yaml
          secret:
            secretName: {{ include "price.realtime.fullname" . }}-config
