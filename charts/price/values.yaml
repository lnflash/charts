# Default values for price.
replicaCount: 1
image:
  repository: us.gcr.io/galoy-org/price
  digest: "sha256:f69ce5cd409254e5d37be1e5fc0d957545333d57bf7892a084cb6f3d6934bbea"
  git_ref: "705dd6a"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  runAsUser: 1000
resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
realtime:
  # Liveness tolerates ~2min of NOT_SERVING before restarting: the health
  # endpoint goes NOT_SERVING on upstream feed staleness (see Ibex
  # cacheSeconds below), and a restart cannot fix a feed gap. Readiness
  # stays tight so stale-price pods are pulled from service immediately.
  livenessProbe:
    initialDelaySeconds: 45
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12
  readinessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  config:
    quotes:
      - {code: "USD", symbol: "$", name: "US Dollar", flag: "\U0001F1FA\U0001F1F8"}
      - {code: "JMD", symbol: "J$", name: "Jamaican Dollar", flag: "\U0001F1EF\U0001F1F2"}
      - {code: "EUR", symbol: "€", name: "Euro", flag: "\U0001F1EA\U0001F1FA"}
      - {code: "GBP", symbol: "£", name: "British Pound", flag: "\U0001F1EC\U0001F1E7"}
      - {code: "XCD", symbol: "$", name: "East Caribbean Dollar", flag: "\U0001F1E6\U0001F1EC"}
      - {code: "ANG", symbol: "ƒ", name: "Netherlands Antillean Guilder", flag: "\U0001F1E8\U0001F1FC"}
      - {code: "HTG", symbol: "G", name: "Haitian Gourde", flag: "\U0001F1ED\U0001F1F9"}
      - {code: "BSD", symbol: "$", name: "Bahamian Dollar", flag: "\U0001F1E7\U0001F1F8"}
      - {code: "BBD", symbol: "$", name: "Barbadian Dollar", flag: "\U0001F1E7\U0001F1E7"}
      - {code: "BZD", symbol: "BZ$", name: "Belize Dollar", flag: "\U0001F1E7\U0001F1FF"}
      - {code: "KYD", symbol: "$", name: "Cayman Islands Dollar", flag: "\U0001F1F0\U0001F1FE"}
      - {code: "CUP", symbol: "$", name: "Cuban Peso", flag: "\U0001F1E8\U0001F1FA"}
      - {code: "DOP", symbol: "RD$", name: "Dominican Peso", flag: "\U0001F1E9\U0001F1F4"}
      - {code: "TTD", symbol: "TT$", name: "Trinidad and Tobago Dollar", flag: "\U0001F1F9\U0001F1F9"}
    exchanges:
      - name: "Ibex"
        enabled: true
        quoteAlias: "*"
        base: "BTC"
        quote: "USD"
        provider: "ibex"
        cron: "*/15 * * * * *"
        config:
          # Must be well above the refresh cron: Ibex is the ONLY USD source,
          # and when the cache expires with no fresh price the health endpoint
          # reports NOT_SERVING (USD gap -> readiness pulled -> api errors).
          # 600s tolerates ~40 consecutive failed refreshes before going stale.
          cacheSeconds: 600
      - name: "free-currency-rates-usd"
        enabled: true
        quoteAlias: "*"
        base: "BTC"
        quote: "*"
        excludedQuotes: ["USD"]
        provider: "free-currency-rates"
        cron: "*/5 * * * * *"
        config:
          baseUrl: "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies"
          fallbackUrl: "https://currency-api.pages.dev/v1/currencies"
          cacheSeconds: 1800
      - name: "kraken"
        enabled: true
        quoteAlias: "*"
        base: "BTC"
        # Only quotes kraken actually lists (USD intentionally absent: the
        # realtime USD rate must track Ibex). Wildcard polling for Caribbean
        # quotes produced permanent BadSymbol noise (~31k lines/6h).
        quote: ["EUR", "GBP", "CAD", "CHF", "JPY", "AUD"]
        provider: "ccxt"
        cron: "*/20 * * * * *"
      - name: "bitstamp"
        enabled: true
        quoteAlias: "*"
        base: "BTC"
        # Only quotes bitstamp actually lists (USD intentionally absent).
        quote: ["EUR", "GBP"]
        provider: "ccxt"
        cron: "*/15 * * * * *"
  image:
    repository: docker.io/lnflash/price
    digest: "sha256:8f6422c3a762ee5badf7d5014652c00b19c3d357db4566a972c62d23130422e9"
    git_ref: "edge"
  service:
    type: ClusterIP
    prometheus: 9464
    grpc: 50051
  podAnnotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "9464"
    prometheus.io/scrape: "true"
history:
  valuesOverride: {}
  image:
    repository: docker.io/lnflash/price-history
    digest: "sha256:916de25989444b317a2704a80a90fcda1af9899feba970daa2db1cc63e8f7159"
  service:
    type: ClusterIP
    prometheus: 9464
    grpc: 50052
  migrateImage:
    repository: docker.io/lnflash/price-history-migrate
    digest: sha256:7a290eb277752b5ab41c3311f3ed409bf344a294a1319e10c9dab58c4c77482e
  cron:
    resources: {}
  migrationJob:
    resources: {}
postgresql:
  image: 
    repository: bitnamilegacy/postgresql
    tag: "16.6.0-debian-12-r2"
  enabled: true
  nameOverride: price-history-db
  primary:
    persistence:
      enabled: true
      storageClass: do-block-storage-xfs-retain # xfs is file system format
      size: 8Gi # Default. Current size is 7756 kB. Find out why 
  auth:
    enablePostgresUser: false
    username: price-history
    database: price-history
    password: price-history
ibex:
  url:
  environment: production
  secrets:
    name: ibex-auth
    clientId:
      key: client-id
    clientSecret:
      key: client-secret
    webhook:
      key: webhook-secret

redis:
  auth:
    existingSecret: galoy-redis-pw
    existingSecretPasswordKey: redis-password
  sentinel:
    enabled: true
    masterSet: mymaster
  replica:
    # only reading from 1 replica
    replicaCount: 1 