{{- if .Values.maintenance.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "strfry.fullname" . }}-maintenance
spec:
  schedule: {{ .Values.maintenance.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: {{ include "strfry.fullname" . }}-maintenance
          restartPolicy: Never
          # RWO block-storage volume: must run on the same node as the relay pod
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: strfry
                  topologyKey: kubernetes.io/hostname
          initContainers:
            # strfry's `delete` needs an exclusive LMDB write transaction, which it
            # can never obtain while the relay holds the single writer lock — it
            # fails deterministically with "mdb_txn_begin: Resource temporarily
            # unavailable", even when the relay is idle. So quiesce the relay first:
            # scale it to 0 and wait for the pod to terminate and release the DB.
            # `compact` only needs a read txn, but we keep it inside the quiesced
            # window for a clean, consistent copy. The relay is scaled back up by
            # the restart-relay container below; its fresh pod swaps the compacted
            # copy into place via the Deployment's swap-compacted-db initContainer.
            - name: scale-down
              image: {{ .Values.maintenance.kubectlImage }}
              command:
                - sh
                - -c
                - |
                  set -e
                  kubectl -n {{ .Release.Namespace }} scale deployment/{{ include "strfry.name" . }} --replicas=0
                  kubectl -n {{ .Release.Namespace }} wait --for=delete pod -l app=strfry --timeout=180s
            - name: retention-delete
              image: {{ .Values.image.repository }}:{{ .Values.image.tag }}@sha256:{{ .Values.image.digest }}
              workingDir: /app
              # int64 coercion is load-bearing: Helm parses YAML numbers as float64,
              # so rendering retentionAgeSeconds raw yields "7.776e+06" (scientific
              # notation), which strfry's --age integer parser rejects. See values.yaml.
              command: ["/app/strfry", "delete", "--age={{ .Values.maintenance.retentionAgeSeconds | int64 }}"]
              volumeMounts:
                - name: strfry-db
                  mountPath: /app/strfry-db
                - name: strfry-conf
                  mountPath: /etc/strfry.conf
                  subPath: strfry.conf
            - name: compact
              image: {{ .Values.image.repository }}:{{ .Values.image.tag }}@sha256:{{ .Values.image.digest }}
              workingDir: /app
              command:
                - sh
                - -c
                - |
                  set -e
                  rm -f /app/strfry-db/data.mdb.compacted.tmp
                  /app/strfry compact /app/strfry-db/data.mdb.compacted.tmp
                  mv /app/strfry-db/data.mdb.compacted.tmp /app/strfry-db/data.mdb.compacted
              volumeMounts:
                - name: strfry-db
                  mountPath: /app/strfry-db
                - name: strfry-conf
                  mountPath: /etc/strfry.conf
                  subPath: strfry.conf
          containers:
            # Scale the relay back up. Recreate strategy + the Deployment's
            # swap-compacted-db initContainer means the fresh pod swaps in the
            # compacted DB and clears the stale lock before opening it.
            - name: restart-relay
              image: {{ .Values.maintenance.kubectlImage }}
              command:
                - kubectl
                - -n
                - {{ .Release.Namespace }}
                - scale
                - deployment/{{ include "strfry.name" . }}
                - --replicas=1
          volumes:
            - name: strfry-db
              persistentVolumeClaim:
                claimName: {{ include "strfry.fullname" . }}-db-pvc
            - name: strfry-conf
              configMap:
                name: {{ include "strfry.fullname" . }}-configmap
{{- end }}
